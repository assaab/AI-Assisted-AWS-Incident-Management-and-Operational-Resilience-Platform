name: ci

on:
  pull_request:
  

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,aws]"
      - name: Format
        run: ruff format --check .
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src apps
      - name: Unit and contract tests
        run: pytest tests -m "not integration"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/console/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --run
      - run: npm run build

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Start stack
        run: docker compose up --build -d
      - name: Wait for stack
        run: python scripts/wait_for_stack.py
      - name: Run scenario
        run: docker compose run --rm scenario
      - name: Run integration tests
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,aws]"
          pytest tests/integration tests/e2e
      - name: Stop stack
        if: always()
        run: docker compose down -v

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,aws]"
      - run: pip-audit
      - run: bandit -r src apps
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
