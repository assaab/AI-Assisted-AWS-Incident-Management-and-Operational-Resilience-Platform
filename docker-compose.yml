services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: sre_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sre_agent"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/local/k8s/dev/otel-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    profiles: ["observability"]

  checkout-service:
    build:
      context: .
      dockerfile: sample-workload/checkout-service/Dockerfile
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env.demo
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      checkout-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/livez')"]
      interval: 5s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env.demo
    command: ["python", "-m", "apps.worker.main"]
    profiles: ["worker"]
    depends_on:
      api:
        condition: service_healthy

  console:
    build:
      context: .
      dockerfile: apps/console/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  scenario:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env.demo
    command: ["python", "scripts/scenario_checkout_failure.py"]
    profiles: ["scenario"]
    depends_on:
      api:
        condition: service_healthy
